version: '3.8'

services:
  app:
    build:
      context: .
      args:
        NEXTAUTH_URL: ${NEXTAUTH_URL}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    restart: unless-stopped
    expose:
      - "3000"
    labels:
      - traefik.docker.network=coolify
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@${COMPOSE_PROJECT_NAME:-financial}-postgres:5432/${POSTGRES_DB:-financial_ls}?schema=public
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - FINANCE_DAILY_EMAIL_TO=${FINANCE_DAILY_EMAIL_TO}
      - CRON_SECRET=${CRON_SECRET}
      - SEED_DB=${SEED_DB:-false}
      - SEED_ADMIN_NAME=${SEED_ADMIN_NAME}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD}
    volumes:
      - ./uploads:/app/uploads
    command: >
      sh -c "npx prisma migrate deploy &&
             if [ \"$SEED_DB\" = \"true\" ]; then npm run db:seed; fi &&
             npm run start"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network
      - coolify

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-financial_ls}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      app-network:
        aliases:
          - ${COMPOSE_PROJECT_NAME:-financial}-postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-financial_ls}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads_data:
  postgres_data:

networks:
  app-network:
    name: ${COMPOSE_PROJECT_NAME:-financial}-app-network
    driver: bridge
  coolify:
    external: true
